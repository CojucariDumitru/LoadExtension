<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoadExtension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <img src="../icons/icon48.png" alt="LoadExtension" class="logo" />
      <div>
        <h1>LoadExtension</h1>
        <p id="rts-status" class="rts-status">RTS: checking…</p>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enabled" />
        <span>On</span>
      </label>
    </header>

    <section class="stats">
      <div><strong id="load-count">0</strong><span>loads enhanced</span></div>
      <div><strong id="min-rpm">0</strong><span>min RPM+</span></div>
    </section>

    <section class="actions">
      <button id="connect-rts" type="button">Connect RTS</button>
      <button id="rescan" type="button">Rescan DAT</button>
      <button id="open-options" type="button" class="secondary">Settings</button>
    </section>

    <p class="hint">Log into RTS once — credit scores appear on DAT automatically, like LoadHunter.</p>

    <script src="../dist/popup.js"></script>
  </body>
</html>
